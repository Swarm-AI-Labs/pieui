name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    test:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [23.2]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: '1.1.36'

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build package
              run: bun run build

            - name: Verify build exports
              run: node scripts/verify-exports.mjs
