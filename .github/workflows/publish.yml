name: Publish to NPM

on:
    push:
        tags:
            - 'v*' # Trigger on version tags like v1.0.0, v1.2.3, etc.

jobs:
    publish:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            id-token: write # Required for npm provenance

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: '1.3.12'

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build package
              run: bun run build

            #            - name: Run step4 build/export checks
            #              run: bun run test:step4

            - name: Setup Node.js for npm publishing
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  registry-url: 'https://registry.npmjs.org'

            # OIDC-based Trusted Publisher requires npm >= 11.5.1.
            # Node 22 ships npm 10, so upgrade explicitly.
            - name: Upgrade npm
              run: npm install -g npm@latest

            - name: Extract version from tag
              id: version
              run: |
                  VERSION=${GITHUB_REF#refs/tags/v}
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "Publishing version: $VERSION"

            # No NODE_AUTH_TOKEN needed: Trusted Publisher (OIDC) is
            # configured on npmjs.com for this repo + workflow file.
            # npm exchanges the GitHub OIDC token for a short-lived
            # publish token automatically.
            - name: Publish to npm
              run: npm publish --access public --provenance
